<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>BSG Multidomain OSINT</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00ffee;--bg:#02070d;--panel:#061018}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#fff;font-family:Rajdhani,sans-serif;overflow-x:hidden}
#commandHeader{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;padding:18px 24px;background:linear-gradient(180deg,#07141c,#050b12);border-bottom:2px solid #00ffee55}
.brand-wrap{display:flex;align-items:center;gap:15px}
.radar-logo,.footer-radar{width:56px;height:56px;border-radius:50%;border:1px solid #00ffee88;box-shadow:0 0 16px #00ffee55;animation:radarPulse 4s infinite}
.footer-radar{width:72px;height:72px}
@keyframes radarPulse{50%{box-shadow:0 0 26px #00ffeeaa}}
.callsign{font-size:30px;font-weight:700;letter-spacing:2px;color:#06161c;text-shadow:0 0 18px #00ffee;transition:text-shadow 0.3s ease;cursor:default}
.callsign:hover{text-shadow:0 0 20px #00ffee,0 0 40px #00ffee,0 0 80px #00ffee,0 0 120px #00ffee88}
.subline{font-size:16px;letter-spacing:4px;color:#fff;text-shadow:0 0 10px #00ffee,0 0 20px #00ffee88;transition:font-size 0.3s ease,text-shadow 0.3s ease}
.OSINT.PLATFORM-sub{font-size:16px;letter-spacing:4px;color:#00ffee;transition:font-size 0.3s ease,text-shadow 0.3s ease}
.callsign:hover~.subline,.callsign:hover~.OSINT.PLATFORM-sub{font-size:22px;text-shadow:0 0 14px #00ffee,0 0 28px #00ffee,0 0 56px #00ffee88}
.header-center{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.command-btn{padding:10px 14px;border:1px solid #00ffee66;background:#081821;color:#00ffee;font-family:'Share Tech Mono';cursor:pointer}
.command-btn.active,.command-btn:hover{background:#0c2430}
#gmtClock{text-align:center;color:#00ffee;width:100%}
.header-right{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 8px}
.market-box{padding:8px 12px;text-align:center;background:transparent;border:none;font-size:12px}
.market-label{font-size:10px;color:#00ffee88;text-transform:uppercase;letter-spacing:1px}
.market-price{font-size:18px;color:#00ffee;font-weight:700;margin-top:2px}
#newsTickerWrap{display:flex;height:42px;background:#050b12;border-top:1px solid #00ffee55;border-bottom:1px solid #00ffee55;overflow:hidden}
.channel{background:#071923;border:none;color:#7fd6df;padding:0 14px;cursor:pointer}.channel.active{background:#092631;color:#00ffee}
.ticker-window{flex:1;overflow:hidden;display:flex;align-items:center}.ticker-track{display:inline-flex;align-items:center;white-space:nowrap;padding-left:100%;animation:scroll 150s linear infinite}
@keyframes scroll{100%{transform:translateX(-100%)}}
.headline-link{display:inline-block;padding-right:95px;color:#d7ffff;text-decoration:none;font-size:18px;line-height:42px}
.placeholder{height:calc(100vh - 126px);display:flex;justify-content:center;align-items:center}
.ops-bay{width:min(1500px,96%);height:78vh;border:1px solid #00ffee44;background:#040b10;overflow:hidden}
#opsShell{height:100%;display:grid;grid-template-columns:280px 1fr;overflow:hidden}
#opsShell.collapsed{grid-template-columns:64px 1fr}
#opsMenu{background:#061018;padding:18px;border-right:1px solid #00ffee44;overflow-y:auto}
.drawer-toggle{width:100%;padding:10px;margin-bottom:18px;background:#081821;border:1px solid #00ffee55;color:#00ffee}
.feed-panel{position:relative;background:#000;border:1px solid #0f2730}
.feed-label{position:absolute;top:10px;left:10px;padding:6px 10px;background:rgba(3,22,29,.8);border:1px solid #00ffee66;color:#00ffee;z-index:2}
iframe,.map-frame{width:100%;height:100%;border:none}
#marineFrame iframe{filter:invert(92%) hue-rotate(180deg) grayscale(.85)}
#flightFrame iframe{filter:invert(92%) hue-rotate(180deg) grayscale(.9) brightness(.6) contrast(1.2)}
#commandFooter{padding:28px;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,#050b12,#07141c);border-top:2px solid #00ffee55}
a{color:#00ffee;text-decoration:none}
</style>
</head>
<body>

<div class='brand-wrap'>

<script>

CentralAfrica:{Angola:[['Jornal de Angola','https://www.jornaldeangola.ao'],['O Pais','https://www.opais.co.ao']],Cameroon:[['Cameroon Tribune','https://www.cameroon-tribune.cm'],['CRTV','https://www.crtv.cm']],CAR:[['Centrafrique News','https://centrafrique-news.com']],Chad:[['Tchad One','https://www.tchadone.org']],Gabon:[['Gabon Infos','https://gabon-infos.com'],['Union','https://lunion.ga']],Congo:[['Congo Online','https://www.congoonline.com'],['Le Potentiel','https://www.lepotentiel.net']]},
EastAfrica:{Burundi:[['Iwacu','https://www.iwacu-burundi.org'],['Renouveau','https://www.renouveau.digital']],Djibouti:[['La Nation','https://www.lanation.dj'],['Djibouti24','https://www.djibouti24.com']],Eritrea:[['Eritrea PFDJ','http://www.shaebiya.com']],Ethiopia:[['Ethiopian News','https://www.ethiopiannews.net'],['Capital','https://www.capitalethiopia.com']],Kenya:[['Daily Nation','https://www.nation.co.ke'],['Standard','https://www.standardmedia.co.ke']],Rwanda:[['KT Press','https://www.ktpress.rw'],['One Africa','https://oneafrika.com']],Somalia:[['Garowe','https://www.garoweonline.com'],['Horseed Media','https://horseedmedia.net']],Tanzania:[['Tanzania Daily','https://www.tanzaniadaily.com'],['The Citizen','https://www.thecitizen.co.tz']],Uganda:[['Pulse Uganda','https://www.pulse.ug'],['New Vision','https://www.newvision.co.ug']]},
SouthernAfrica:{Botswana:[['Mmegi','https://www.mmegi.bw'],['Patriot','https://www.thepatriot.co.bw']],Lesotho:[['Lesotho Times','https://lestimes.com'],['Public Eye','https://publiceyenews.com']],Madagascar:[['Madagascar Tribune','https://www.madagascar-tribune.com']],Malawi:[['Nyasa Times','https://www.nyasatimes.com'],['Malawi 24','https://malawi24.com']],Mozambique:[['Mocambique No','https://www.mozambiqueno.com']],Namibia:[['Namibia Economist','https://economist.com.na'],['New Era','https://www.newera.com.na']],SouthAfrica:[['News24','https://www.news24.com'],['TimesLive','https://www.timeslive.co.za']],Eswatini:[['Swazi Observer','https://www.observer.org.sz'],['Times of Eswatini','https://www.times.co.sz']],Zambia:[['Zambia Daily','https://www.zambiadaily.com'],['News Diggers','https://www.newsdiggers.com']],Zimbabwe:[['Herald','https://www.herald.co.zw'],['NewsDay','https://www.newsday.co.zw']]}
};

function renderNews(){
let feeds=africaFeeds;
if(africa===false)feeds=globalFeeds;
let viewport=document.getElementById('newsViewport');
if(full){viewport.innerHTML=`<iframe src='${feeds[idx][1]}'></iframe>`;return}
let h="<div style='height:100%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:2px">";
feeds.forEach(f=>h+=`<div class='feed-panel'><div class='feed-label'>${f[0]}</div><iframe src='${f[1]}'></iframe></div>`);
viewport.innerHTML=h+'</div>'}

function loadPanAfricaHub(){
active('newsBtn');
renderOps(`
<button class='command-btn' onclick='loadNews()'>LIVE NEWS GRID</button><br><br>
<button class='command-btn' onclick="loadRegionFeeds('NorthAfrica')">NORTH AFRICA</button><br><br>
<button class='command-btn' onclick="loadRegionFeeds('WestAfrica')">WEST AFRICA</button><br><br>
<button class='command-btn' onclick="loadRegionFeeds('CentralAfrica')">CENTRAL AFRICA</button><br><br>
<button class='command-btn' onclick="loadRegionFeeds('EastAfrica')">EAST AFRICA</button><br><br>
<button class='command-btn' onclick="loadRegionFeeds('SouthernAfrica')">SOUTHERN AFRICA</button>
`,`<div id='panAfricaViewport' style='height:100%;overflow-y:auto'></div>`);
loadRegionFeeds('WestAfrica');
}
function loadRegionFeeds(region){
const countries=africaData[region];
let html="<div style='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px">";
Object.entries(countries).forEach(([country,sources])=>{
html+=`<div class='feed-panel'><div class='feed-label'>${country}</div><div style='padding:54px 14px'>`;
sources.forEach(src=>html+=`<p style='margin:12px 0'><a href='${src[1]}' target='_blank'>${src[0]}</a></p>`);
html+='</div></div>`});
html+='</div>';
document.getElementById('panAfricaViewport').innerHTML=html;
}

function loadNews(){
active('newsBtn');
renderOps(`
<button class='command-btn' onclick="africa=false;full=false;renderNews()">GLOBAL NEWS</button><br><br>
<button class='command-btn' onclick="africa=true;full=false;renderNews()">AFRICA NEWS</button><br><br>
<button class='command-btn' onclick='loadPanAfricaHub()'>PAN AFRICA</button><br><br>
<button class='command-btn' onclick="full=!full;idx=(idx+1)%6;renderNews()">FULL SCREEN</button>
`,`<div id='newsViewport' style='height:100%'></div>`);
renderNews();
}

function setConflict(z){const m={iran:'https://iran.liveuamap.com/',sudan:'https://sudan.liveuamap.com/',nigeria:'https://nigeria.liveuamap.com/',sahel:'https://sahel.liveuamap.com/',drcongo:'https://drcongo.liveuamap.com/',ethiopia:'https://ethiopia.liveuamap.com/',somalia:'https://somalia.liveuamap.com/'};document.getElementById('conflictFrame').innerHTML=`<iframe class='map-frame' src='${m[z]}'></iframe>`}
function loadConflict(){active('mapBtn');renderOps(`
<button class='command-btn' onclick="setConflict('iran')">MIDDLE EAST</button><br><br>
<button class='command-btn' onclick="setConflict('sudan')">SUDAN</button><br><br>
<button class='command-btn' onclick="setConflict('nigeria')">NIGERIA</button><br><br>
<button class='command-btn' onclick="setConflict('sahel')">SAHEL</button><br><br>
<button class='command-btn' onclick="setConflict('drcongo')">DR CONGO</button><br><br>
<button class='command-btn' onclick="setConflict('ethiopia')">ETHIOPIA</button><br><br>
<button class='command-btn' onclick="setConflict('somalia')">SOMALIA</button>
`,`<div id='conflictFrame' style='height:100%'></div>`);setConflict('iran')}
function setMarine(z){const f={hormuz:'https://www.marinetraffic.com/en/ais/embed/zoom:6/centery:25.9/centerx:57.6/maptype:4',bab:'https://www.marinetraffic.com/en/ais/embed/zoom:6/centery:12.6/centerx:42.3/maptype:4',suez:'https://www.marinetraffic.com/en/ais/embed/zoom:6/centery:29.8/centerx:32.2/maptype:4',bosporus:'https://www.marinetraffic.com/en/ais/embed/zoom:6/centery:41.0/centerx:29.0/maptype:4',malacca:'https://www.marinetraffic.com/en/ais/embed/zoom:5/centery:2.6/centerx:100.8/maptype:4',panama:'https://www.marinetraffic.com/en/ais/embed/zoom:6/centery:9.0/centerx:-79.6/maptype:4',gibraltar:'https://www.marinetraffic.com/en/ais/embed/zoom:5/centery:35.9/centerx:-5.3/maptype:4'};document.getElementById('marineFrame').innerHTML=`<iframe class='map-frame' src='${f[z]}'></iframe>`}
function loadMarine(){active('marineBtn');renderOps(`
<button class='command-btn' onclick="setMarine('hormuz')">HORMUZ</button><br><br>
<button class='command-btn' onclick="setMarine('bab')">BAB EL MANDEB</button><br><br>
<button class='command-btn' onclick="setMarine('suez')">SUEZ</button><br><br>
<button class='command-btn' onclick="setMarine('bosporus')">BOSPORUS</button><br><br>
<button class='command-btn' onclick="setMarine('malacca')">MALACCA</button><br><br>
<button class='command-btn' onclick="setMarine('panama')">PANAMA</button><br><br>
<button class='command-btn' onclick="setMarine('gibraltar')">GIBRALTAR</button>
`,`<div id='marineFrame' style='height:100%'></div>`);setMarine('hormuz')}
function setFlight(z){const m={global:'https://globe.adsbexchange.com/',africa:'https://globe.adsbexchange.com/?lat=5&lon=20&zoom=3',europe:'https://globe.adsbexchange.com/?lat=50&lon=10&zoom=4',americas:'https://globe.adsbexchange.com/?lat=40&lon=-95&zoom=3',me:'https://globe.adsbexchange.com/?lat=25&lon=55&zoom=4',asia:'https://globe.adsbexchange.com/?lat=35&lon=95&zoom=3'};document.getElementById('flightFrame').innerHTML=`<iframe class='map-frame' src='${m[z]}'></iframe>`}
function loadFlight(){active('flightBtn');renderOps(`
<button class='command-btn' onclick="setFlight('global')">GLOBAL</button><br><br>
<button class='command-btn' onclick="setFlight('africa')">AFRICA</button><br><br>
<button class='command-btn' onclick="setFlight('europe')">EUROPE</button><br><br>
<button class='command-btn' onclick="setFlight('americas')">AMERICAS</button><br><br>
<button class='command-btn' onclick="setFlight('me')">MIDDLE EAST</button><br><br>
<button class='command-btn' onclick="setFlight('asia')">ASIA</button>
`,`<div id='flightFrame' style='height:100%'></div>`);setFlight('global')}
const tvWidgets={
overview:{src:'https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js',cfg:{"colorTheme":"dark","dateRange":"12M","locale":"en","largeChartUrl":"","isTransparent":false,"showChart":true,"showSymbolLogo":true,"width":"100%","height":"100%"}},
stocks:{src:'https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js',cfg:{"dataSource":"SPX500","blockSize":"market_cap_basic","blockColor":"change","grouping":"sector","locale":"en","isTransparent":false,"width":"100%","height":"100%"}},

};
function marketView(mode){const f=document.getElementById('marketFrame');const w=tvWidgets[mode];f.innerHTML='<div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div></div>';const script=document.createElement('script');script.src=w.src;script.async=true;script.innerHTML=`var tvDataPlugin = {"DEFAULT":${JSON.stringify(w.cfg)}}`;f.appendChild(script)}
function loadMarkets(){active('marketsBtn');renderOps(`
<button class='command-btn' onclick="marketView('overview')">OVERVIEW</button><br><br>
<button class='command-btn' onclick="marketView('stocks')">STOCKS</button><br><br>
<button class='command-btn' onclick="marketView('crypto')">CRYPTO</button>
`,`<div id='marketFrame' style='height:100%'></div>`);marketView('overview')}

newsBtn.onclick=loadNews;mapBtn.onclick=loadConflict;marineBtn.onclick=loadMarine;flightBtn.onclick=loadFlight;marketsBtn.onclick=loadMarkets;
const rss=['https://www.aljazeera.com/xml/rss/all.xml','http://feeds.bbci.co.uk/news/world/rss.xml','https://feeds.skynews.com/feeds/rss/world.xml','https://www.rt.com/rss/news/'];
const tags=['AJ','BBC','SKY','RT'];let cf=0;
document.querySelectorAll('.channel').forEach((b,i)=>b.onclick=()=>{document.querySelectorAll('.channel').forEach(x=>x.classList.remove('active'));b.classList.add('active');cf=i;loadTicker()});
async function loadTicker(){try{let r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rss[cf]));let d=await r.json();newsTicker.innerHTML=d.items.slice(0,10).map(i=>`<a href='${i.link}' target='_blank' class='headline-link'>${i.title}</a>`).join('')}catch(e){console.error(e)}}
loadTicker();loadNews();
async function fetchPrices(){
const oilEl=document.getElementById('oilPrice');
const goldEl=document.getElementById('goldPrice');
const silverEl=document.getElementById('silverPrice');
const btcEl=document.getElementById('btcPrice');
try{
const r=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
const d=await r.json();
btcEl.textContent='$'+Math.round(parseFloat(d.price)).toLocaleString()
}catch(e){btcEl.textContent='Error'}
try{
const parser=new DOMParser();
const response=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://tradingeconomics.com/commodities'));
const data=await response.json();
const doc=parser.parseFromString(data.contents,'text/html');
const priceElements=doc.querySelectorAll('[data-test="infobox-price"]');
let priceMap={};
doc.querySelectorAll('[data-test="infobox-name"]').forEach((el,i)=>{
const name=el.textContent.trim().toUpperCase();
if(priceElements[i]){priceMap[name]=priceElements[i].textContent.trim()}
});
if(priceMap['CRUDE OIL']||priceMap['WTI']){oilEl.textContent='$'+priceMap['CRUDE OIL']||priceMap['WTI']}
if(priceMap['GOLD']){goldEl.textContent='$'+priceMap['GOLD']}
if(priceMap['SILVER']){silverEl.textContent='$'+priceMap['SILVER']}
}catch(e){
console.error('Commodity fetch error:',e);
oilEl.textContent='--';
goldEl.textContent='--';
silverEl.textContent='--'
}
}
fetchPrices();setInterval(fetchPrices,60000);
</script>

</html>
